name: Release

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v0.1.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  linux-bundles:
    name: Build Linux release bundles
    runs-on: nixos
    env:
      TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}

      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Validate release contract
        run: scripts/release/check-version-consistency "$TAG"

      - name: Build and test release inputs
        run: >-
          nix build --quiet
          .#checks.x86_64-linux.build
          .#checks.x86_64-linux.unit
          .#checks.x86_64-linux.golden
          .#checks.x86_64-linux.lint

      - name: Build AppImage
        run: >-
          nix --quiet bundle
          --bundler github:ralismark/nix-appimage
          .#packages.x86_64-linux.default
          -o amaru-treasury-tx.AppImage

      - name: Build DEB
        run: >-
          nix --quiet bundle
          --bundler github:NixOS/bundlers#toDEB
          .#packages.x86_64-linux.default
          -o amaru-treasury-tx.deb

      - name: Build RPM
        run: >-
          nix --quiet bundle
          --bundler github:NixOS/bundlers#toRPM
          .#packages.x86_64-linux.default
          -o amaru-treasury-tx.rpm

      - name: Stage artifacts
        run: |
          set -euo pipefail
          version="$(scripts/release/get-cabal-version)"
          mkdir -p artifacts
          cp -L amaru-treasury-tx.AppImage \
            "artifacts/amaru-treasury-tx-${version}-x86_64-linux.AppImage"
          cp -L amaru-treasury-tx.AppImage \
            "artifacts/amaru-treasury-tx.AppImage"
          cp amaru-treasury-tx.deb/*.deb \
            "artifacts/amaru-treasury-tx-${version}-x86_64-linux.deb"
          cp amaru-treasury-tx.rpm/*.rpm \
            "artifacts/amaru-treasury-tx-${version}-x86_64-linux.rpm"
          ls -lh artifacts/

      - name: Smoke-test AppImage
        run: |
          set -euo pipefail
          version="$(scripts/release/get-cabal-version)"
          rm -rf /tmp/appimage-smoke
          mkdir -p /tmp/appimage-smoke
          chmod +x "artifacts/amaru-treasury-tx-${version}-x86_64-linux.AppImage"
          ( cd /tmp/appimage-smoke && \
            "$GITHUB_WORKSPACE/artifacts/amaru-treasury-tx-${version}-x86_64-linux.AppImage" \
              --appimage-extract )
          bin="$(find /tmp/appimage-smoke -name amaru-treasury-tx \
            -type f -executable | head -1)"
          test -x "$bin"
          "$bin" --help

      - name: Smoke-test DEB
        run: |
          set -euo pipefail
          version="$(scripts/release/get-cabal-version)"
          rm -rf /tmp/deb-smoke
          mkdir -p /tmp/deb-smoke
          nix --quiet shell nixpkgs#dpkg -c \
            dpkg-deb -x \
              "artifacts/amaru-treasury-tx-${version}-x86_64-linux.deb" \
              /tmp/deb-smoke
          bin="$(find /tmp/deb-smoke -name amaru-treasury-tx \
            -type f -executable | head -1)"
          test -x "$bin"
          "$bin" --help

      - name: Smoke-test RPM
        run: |
          set -euo pipefail
          version="$(scripts/release/get-cabal-version)"
          rm -rf /tmp/rpm-smoke
          mkdir -p /tmp/rpm-smoke
          rpm_path="$PWD/artifacts/amaru-treasury-tx-${version}-x86_64-linux.rpm"
          nix --quiet shell nixpkgs#rpm nixpkgs#cpio -c bash -c \
            "cd /tmp/rpm-smoke && rpm2cpio \"$rpm_path\" | cpio -idm >/dev/null"
          bin="$(find /tmp/rpm-smoke -name amaru-treasury-tx \
            -type f -executable | head -1)"
          test -x "$bin"
          "$bin" --help

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-release-bundles
          path: artifacts/*
          if-no-files-found: error
          retention-days: 30

      - name: Create release and upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes="$(mktemp)"
          scripts/release/extract-notes "$TAG" > "$notes"
          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" \
              --title "amaru-treasury-tx $TAG" \
              --notes-file "$notes" \
            || gh release view "$TAG" >/dev/null
          gh release upload "$TAG" artifacts/* --clobber
