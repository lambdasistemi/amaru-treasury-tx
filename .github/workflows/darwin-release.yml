name: Darwin Release

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: darwin-release
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build amaru-treasury-tx for aarch64-darwin
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            extra-substituters = https://cache.iog.io https://paolino.cachix.org
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= paolino.cachix.org-1:ecmgO3CXdgSWA2cHlm4srknd/cLFMLmK3i3NrzeDFaE=

      - name: Build
        run: nix build -L --print-out-paths .#default > /tmp/nix-out

      - name: Bundle three executables with their dylibs
        run: |
          mkdir -p /tmp/bundle/bin /tmp/bundle/lib

          for exe in amaru-treasury-tx swap-probe capture-swap-context; do
            src="$(cat /tmp/nix-out)/bin/$exe"
            if [ ! -x "$src" ]; then
              echo "missing executable: $src"
              exit 1
            fi
            cp "$src" "/tmp/bundle/bin/$exe"

            # Rewrite every non-system dylib reference in this exe.
            otool -L "/tmp/bundle/bin/$exe" \
              | grep -v /usr/lib | grep -v /System | grep -v ":" \
              | awk '{print $1}' | while read lib; do
                libname=$(basename "$lib")
                if [ ! -f "/tmp/bundle/lib/$libname" ]; then
                  cp "$lib" "/tmp/bundle/lib/$libname"
                fi
                install_name_tool -change "$lib" \
                  "@executable_path/../libexec/lib/$libname" \
                  "/tmp/bundle/bin/$exe"
              done

            echo "==> Verify $exe:"
            otool -L "/tmp/bundle/bin/$exe"
          done

      - name: Create tarball
        run: |
          VERSION=$(jq -r '."."' .release-please-manifest.json 2>/dev/null || echo "0.1.0")
          tar czf /tmp/amaru-treasury-tx-${VERSION}-aarch64-darwin.tar.gz -C /tmp/bundle .
          shasum -a 256 /tmp/amaru-treasury-tx-${VERSION}-aarch64-darwin.tar.gz
          echo "$VERSION" > /tmp/version.txt

      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat /tmp/version.txt)
          TAG="v${VERSION}"
          TARBALL="/tmp/amaru-treasury-tx-${VERSION}-aarch64-darwin.tar.gz"
          gh release upload "$TAG" "$TARBALL" --clobber || \
            gh release create "$TAG" \
              --title "amaru-treasury-tx $TAG" \
              --notes "aarch64-darwin release" \
              "$TARBALL"

      - name: Update homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION=$(cat /tmp/version.txt)
          TAG="v${VERSION}"
          TARBALL="/tmp/amaru-treasury-tx-${VERSION}-aarch64-darwin.tar.gz"
          SHA=$(shasum -a 256 "$TARBALL" | cut -d' ' -f1)
          URL="https://github.com/lambdasistemi/amaru-treasury-tx/releases/download/${TAG}/amaru-treasury-tx-${VERSION}-aarch64-darwin.tar.gz"

          printf 'class AmaruTreasuryTx < Formula\n  desc "Build unsigned Amaru treasury transactions (disburse, swap, withdraw)"\n  homepage "https://github.com/lambdasistemi/amaru-treasury-tx"\n  url "%s"\n  sha256 "%s"\n  version "%s"\n\n  def install\n    bin.install "bin/amaru-treasury-tx", "bin/swap-probe", "bin/capture-swap-context"\n    (libexec/"lib").install Dir["lib/*"]\n  end\nend\n' \
            "$URL" "$SHA" "$VERSION" \
            > /tmp/amaru-treasury-tx.rb

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/lambdasistemi/homebrew-tap.git" /tmp/tap
          mkdir -p /tmp/tap/Formula
          cp /tmp/amaru-treasury-tx.rb /tmp/tap/Formula/amaru-treasury-tx.rb
          cd /tmp/tap
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Formula/amaru-treasury-tx.rb
          git diff --cached --quiet || \
            git commit -m "update amaru-treasury-tx to ${TAG}"
          git push

      - name: Test brew install
        run: |
          brew tap lambdasistemi/tap
          brew install amaru-treasury-tx
          amaru-treasury-tx --help || true
          which amaru-treasury-tx
          otool -L "$(which amaru-treasury-tx)"
