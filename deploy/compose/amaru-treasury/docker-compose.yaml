services:
  amaru-treasury:
    image: ghcr.io/lambdasistemi/amaru-treasury-tx-api:${VERSION:-latest}
    container_name: amaru-treasury
    restart: unless-stopped
    read_only: true
    # Writable /tmp for the history RDF pipeline. /txs/query,
    # /txs/shacl and ?asset= stage Turtle for cq-rdf/arq/shacl
    # via withSystemTempDirectory (under /tmp). With read_only
    # root and no tmpfs, every such request 500s
    # ("createDirectory: permission denied").
    tmpfs:
      - /tmp
    networks:
      - web
    volumes:
      # The production cardano-node-mainnet compose binds
      # /node/mainnet (the whole dir) to /ipc and the socket
      # gets created at /node/mainnet/node.socket — not at
      # /node/mainnet/ipc/node.socket. Mounting the parent
      # so cardano-node propagation works.
      - /node/mainnet:/n2c:ro
      # #242 — Persistent RocksDB volume for the embedded
      # chain-sync follower. Survives container restarts so
      # the indexer resumes from getResumePoints instead of
      # cold-syncing from mainnetIndexerStartSlot every roll.
      - amaru-treasury-indexer:/var/lib/amaru-treasury/indexer-rocksdb
    labels:
      - traefik.docker.network=web
      - traefik.http.routers.amaru-treasury.rule=Host(`amaru-treasury.plutimus.com`)
      - traefik.http.routers.amaru-treasury.tls=true
      - traefik.http.routers.amaru-treasury.tls.certresolver=le
      - traefik.http.services.amaru-treasury.loadbalancer.server.port=8080
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "10"

networks:
  web:
    external: true

volumes:
  # #242 — Production indexer state. Isolated from the dev
  # variant (which uses `amaru-treasury-indexer-dev`) so a
  # `docker compose down -v` in either environment can't
  # nuke the other's chain-sync progress.
  amaru-treasury-indexer:
