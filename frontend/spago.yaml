package:
  name: amaru-treasury-dashboard
  dependencies:
    - prelude
    - effect
    - aff
    - console
    - halogen
    - affjax
    - affjax-web
    - argonaut
    - argonaut-codecs
    - arrays
    - either
    - foldable-traversable
    - maybe
    - strings
    - ordered-collections
    - refs
    - tuples
    - web-html
    - web-dom
    - web-events
    - web-uievents
    - foreign-object
    - integers
    - numbers
    - datetime
    - now
    - js-timers
    - parallel
    - browser-json-tree
  bundle:
    module: Main
    outfile: dist/index.js
    platform: browser
    type: app
  test:
    main: Test.Main
    dependencies:
      - spec

workspace:
  packageSet:
    registry: 72.1.0
  extraPackages:
    # browser-json-tree — JsonTree renderer + Behaviour
    # extracted from this repo.  The actual source is
    # vendored into `vendor/browser-json-tree/` by
    # `nix/frontend.nix` from the flake input pinned at
    # the top-level `flake.nix`.
    browser-json-tree:
      path: ./vendor/browser-json-tree
