name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build
        run: nix build --quiet .#default
      - name: Test
        run: nix run --quiet .#unit
      - name: Released
        run: echo "Released ${{ needs.release-please.outputs.tag_name }}"

  linux-bundles:
    name: Build Linux bundles (AppImage, DEB, RPM)
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: nixos
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build AppImage
        run: >-
          nix --quiet bundle
          --bundler github:ralismark/nix-appimage
          .#default
          -o amaru-treasury-tx.AppImage

      - name: Build DEB
        run: >-
          nix --quiet bundle
          --bundler github:NixOS/bundlers#toDEB
          .#default
          -o amaru-treasury-tx.deb

      - name: Build RPM
        run: >-
          nix --quiet bundle
          --bundler github:NixOS/bundlers#toRPM
          .#default
          -o amaru-treasury-tx.rpm

      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          cp amaru-treasury-tx.deb/*.deb amaru-treasury-tx-${TAG}.deb
          cp amaru-treasury-tx.rpm/*.rpm amaru-treasury-tx-${TAG}.rpm
          cp -L amaru-treasury-tx.AppImage amaru-treasury-tx-${TAG}.AppImage

          gh release upload ${TAG} \
            amaru-treasury-tx-${TAG}.deb \
            amaru-treasury-tx-${TAG}.rpm \
            amaru-treasury-tx-${TAG}.AppImage \
            --clobber
