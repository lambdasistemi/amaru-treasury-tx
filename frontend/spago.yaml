package:
  name: amaru-treasury-dashboard
  dependencies:
    - prelude
    - effect
    - aff
    - console
    - halogen
    - affjax
    - affjax-web
    - argonaut
    - argonaut-codecs
    - arrays
    - either
    - foldable-traversable
    - maybe
    - strings
    - ordered-collections
    - refs
    - tuples
    - web-html
    - web-dom
    - web-events
    - web-uievents
    - foreign-object
    - integers
    - numbers
    - datetime
    - now
    - js-timers
    - parallel
    - browser-json-tree
  bundle:
    module: Main
    outfile: dist/index.js
    platform: browser
    type: app
  # #289 slice B — `test:` block dropped.  No `Test.Main`
  # exists in the source tree, and the `spec` test dep
  # dragged in 50+ transitive packages (ansi, avar, mmorph,
  # …) that aren't in spago.lock's closure.  When
  # `spago bundle --offline` regenerates an out-of-date
  # lockfile it pulls the full test closure too, fails the
  # offline check on a random missing transitive package,
  # and aborts.  Removing the unused test surface keeps the
  # closure to the 83 packages mkSpagoDerivation actually
  # stages.  Restore this block once a Test.Main is added.

workspace:
  packageSet:
    registry: 72.1.0
  extraPackages:
    # browser-json-tree — JsonTree renderer + Behaviour
    # extracted from this repo.  The actual source is
    # vendored into `vendor/browser-json-tree/` by
    # `nix/frontend.nix` from the flake input pinned at
    # the top-level `flake.nix`.
    browser-json-tree:
      path: ./vendor/browser-json-tree
