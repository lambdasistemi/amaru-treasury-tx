# #239 / #263 — Dev variant.  Both the static bundle AND the
# api binary are bind-mounted from the host so the dev loop
# never needs an image rebuild.
#
# Iteration loop (frontend):
#   1. Edit PureScript.
#   2. nix build .#frontend
#   3. cp -f result/* /home/paolino/services/amaru-treasury-dev/static/
#   4. Browser reload — no container action.
#
# Iteration loop (backend):
#   1. Edit Haskell.
#   2. nix build .#amaru-treasury-tx-api \
#        --out-link /home/paolino/services/amaru-treasury-dev/api-result
#   3. cp -f /home/paolino/services/amaru-treasury-dev/api-result/bin/amaru-treasury-tx-api \
#           /home/paolino/services/amaru-treasury-dev/api-bin/
#   4. docker restart amaru-treasury-dev   (~3 s)
#
# /nix/store on the host is bind-mounted read-only so the
# binary's RPATH-encoded library paths resolve inside the
# container.  No image rebuild needed.

services:
  amaru-treasury-dev:
    image: ghcr.io/lambdasistemi/amaru-treasury-tx-api:${VERSION:-latest}
    container_name: amaru-treasury-dev
    restart: unless-stopped
    read_only: true
    networks:
      - web
    volumes:
      - /code/cardano-mainnet/ipc:/n2c:ro
      - /home/paolino/services/amaru-treasury-dev/static:/srv/static:ro
      - /nix/store:/nix/store:ro
      - /home/paolino/services/amaru-treasury-dev/api-bin:/srv/api-bin:ro
      # #242 — Persistent RocksDB volume for the embedded
      # chain-sync follower. Named separately from the
      # production volume so a `docker compose down -v` in
      # one environment can't nuke the other's state.
      - amaru-treasury-indexer-dev:/var/lib/amaru-treasury/indexer-rocksdb
    command:
      - /srv/api-bin/amaru-treasury-tx-api
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --socket
      - /n2c/node.socket
      - --metadata
      - /etc/amaru-treasury/metadata.json
      - --manifest
      - /etc/amaru-treasury/recent-txs.json
      - --build-identity
      - /etc/amaru-treasury/build-identity.json
      - --static
      - /srv/static
      - --indexer-db
      - /var/lib/amaru-treasury/indexer-rocksdb
    labels:
      - traefik.docker.network=web
      - traefik.http.routers.amaru-treasury-dev.rule=Host(`amaru-treasury.dev.plutimus.com`)
      - traefik.http.routers.amaru-treasury-dev.tls=true
      - traefik.http.routers.amaru-treasury-dev.tls.certresolver=le
      - traefik.http.services.amaru-treasury-dev.loadbalancer.server.port=8080
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "10"

networks:
  web:
    external: true

volumes:
  # #242 — Dev variant of the embedded indexer's RocksDB
  # state. Named separately from production so the two
  # environments can be started + torn down independently.
  amaru-treasury-indexer-dev:
