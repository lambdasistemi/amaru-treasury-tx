site_name: amaru-treasury-tx
site_description: >-
  Build unsigned Amaru treasury transactions
  (disburse, reorganize, withdraw)
site_url: https://lambdasistemi.github.io/amaru-treasury-tx/
repo_url: https://github.com/lambdasistemi/amaru-treasury-tx
repo_name: lambdasistemi/amaru-treasury-tx
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mermaid2

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Quickstart: quickstart.md
  - Swap recipe: swap.md
  - ChainContext: chain-context.md
  - Parity report: parity.md
  - Release automation: release.md
