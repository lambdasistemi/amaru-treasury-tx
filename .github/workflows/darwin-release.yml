name: Darwin Release

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, or branch/ref when publish is no"
        required: true
        type: string
      publish:
        description: "Upload to the GitHub release and update Homebrew"
        type: choice
        options: [ "no", "yes" ]
        default: "no"

permissions:
  contents: write

concurrency:
  group: darwin-release-${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build aarch64-darwin release bundle
    runs-on: macos-14
    env:
      BUILD_REF: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
      TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
      PUBLISH: ${{ github.event_name == 'push' || inputs.publish == 'yes' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.BUILD_REF }}

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            extra-substituters = https://cache.iog.io https://paolino.cachix.org
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= paolino.cachix.org-1:ecmgO3CXdgSWA2cHlm4srknd/cLFMLmK3i3NrzeDFaE=

      # install-nix-action only configures READ substituters. cachix-action
      # auths + auto-pushes new derivations on post-build, so subsequent
      # macos-14 runs can hit cache instead of recompiling. Without this
      # step the build still succeeds but every release re-burns the
      # GHC + cardano-crypto compile from source.
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Validate release contract
        if: ${{ env.PUBLISH == 'true' }}
        run: scripts/release/check-version-consistency "$TAG"

      - name: Build executables
        run: >-
          nix build -L --print-out-paths
          .#amaru-treasury-tx
          .#swap-probe
          .#capture-swap-context
          > /tmp/nix-outs

      - name: Bundle executables with their dylibs
        run: |
          set -euo pipefail
          mkdir -p /tmp/bundle/bin /tmp/bundle/libexec/lib

          for exe in amaru-treasury-tx swap-probe capture-swap-context; do
            src="$(
              while read -r out; do
                if [ -x "$out/bin/$exe" ]; then
                  echo "$out/bin/$exe"
                  break
                fi
              done < /tmp/nix-outs
            )"
            if [ ! -x "$src" ]; then
              echo "missing executable: $exe"
              exit 1
            fi
            cp "$src" "/tmp/bundle/bin/$exe"

            otool -L "/tmp/bundle/bin/$exe" \
              | grep -v /usr/lib | grep -v /System | grep -v ":" \
              | awk '{print $1}' | while read -r lib; do
                libname="$(basename "$lib")"
                if [ ! -f "/tmp/bundle/libexec/lib/$libname" ]; then
                  cp "$lib" "/tmp/bundle/libexec/lib/$libname"
                fi
                install_name_tool -change "$lib" \
                  "@executable_path/../libexec/lib/$libname" \
                  "/tmp/bundle/bin/$exe"
              done

            otool -L "/tmp/bundle/bin/$exe"
          done

      - name: Create tarball
        run: |
          set -euo pipefail
          version="$(scripts/release/get-cabal-version)"
          if [[ "$PUBLISH" == "true" ]]; then
            tarball="/tmp/amaru-treasury-tx-${version}-aarch64-darwin.tar.gz"
          else
            sha="$(git rev-parse --short HEAD)"
            tarball="/tmp/amaru-treasury-tx-${version}-${sha}-aarch64-darwin.tar.gz"
          fi
          tar czf "$tarball" -C /tmp/bundle .
          shasum -a 256 "$tarball" | tee /tmp/tarball.sha256
          echo "$tarball" > /tmp/tarball-path

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: darwin-release-bundle
          path: /tmp/amaru-treasury-tx-*-aarch64-darwin.tar.gz
          if-no-files-found: error
          retention-days: 30

      - name: Summarize build
        run: |
          set -euo pipefail
          {
            echo "Built $(cat /tmp/tarball-path)"
            echo
            echo '```'
            cat /tmp/tarball.sha256
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create release and upload artifact
        if: ${{ env.PUBLISH == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes="$(mktemp)"
          scripts/release/extract-notes "$TAG" > "$notes"
          tarball="$(cat /tmp/tarball-path)"
          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" \
              --title "amaru-treasury-tx $TAG" \
              --notes-file "$notes" \
            || gh release view "$TAG" >/dev/null
          gh release upload "$TAG" "$tarball" --clobber

      - name: Update homebrew tap
        if: ${{ env.PUBLISH == 'true' }}
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          set -euo pipefail
          version="$(scripts/release/get-cabal-version)"
          tag="v${version}"
          tarball="$(cat /tmp/tarball-path)"
          sha="$(shasum -a 256 "$tarball" | cut -d' ' -f1)"
          url="https://github.com/lambdasistemi/amaru-treasury-tx/releases/download/${tag}/amaru-treasury-tx-${version}-aarch64-darwin.tar.gz"

          printf 'class AmaruTreasuryTx < Formula\n  desc "Build unsigned Amaru treasury transactions (disburse, swap, withdraw)"\n  homepage "https://github.com/lambdasistemi/amaru-treasury-tx"\n  url "%s"\n  sha256 "%s"\n  version "%s"\n\n  def install\n    bin.install "bin/amaru-treasury-tx", "bin/swap-probe", "bin/capture-swap-context"\n    (libexec/"lib").install Dir["libexec/lib/*"]\n  end\nend\n' \
            "$url" "$sha" "$version" \
            > /tmp/amaru-treasury-tx.rb

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/lambdasistemi/homebrew-tap.git" /tmp/tap
          mkdir -p /tmp/tap/Formula
          cp /tmp/amaru-treasury-tx.rb /tmp/tap/Formula/amaru-treasury-tx.rb
          cd /tmp/tap
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Formula/amaru-treasury-tx.rb
          git diff --cached --quiet \
            || git commit -m "update amaru-treasury-tx to ${tag}"
          git push

      - name: Test brew install
        if: ${{ env.PUBLISH == 'true' }}
        run: |
          set -euo pipefail
          brew tap lambdasistemi/tap
          brew install amaru-treasury-tx
          amaru-treasury-tx --help
          which amaru-treasury-tx
          otool -L "$(which amaru-treasury-tx)"
