<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Amaru Treasury — inspect dashboard</title>
    <meta
      name="description"
      content="Live read-only view of the Amaru 2026 treasury across all four registered scopes."
    />
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fbfbfd;
        --fg: #1a1a1f;
        --muted: #555;
        --accent: #2b5fb0;
        --card: #ffffff;
        --border: #e2e2e8;
        --mono: ui-monospace, "SF Mono", "Cascadia Code",
          "Source Code Pro", monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #14141a;
          --fg: #f3f3f7;
          --muted: #a6a6b0;
          --accent: #6da6ff;
          --card: #1e1e26;
          --border: #2a2a36;
        }
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system,
          "Helvetica Neue", Arial, sans-serif;
        font-size: 15px;
        line-height: 1.5;
      }
      #app {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1rem;
      }
      noscript {
        display: block;
        padding: 2rem;
        text-align: center;
      }
      .site-header {
        padding: 1.5rem 0;
        border-bottom: 1px solid var(--border);
      }
      .site-header h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin: 0;
      }
      .site-tagline {
        margin: 0.25rem 0 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .site-main {
        flex: 1;
        padding: 1rem 0;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .scope-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1rem;
      }
      .scope-card h2 {
        margin: 0 0 0.75rem 0;
        font-size: 1.1rem;
        font-family: var(--mono);
        font-weight: 600;
      }
      .scope-error {
        color: #c33;
      }
      .recent-txs {
        padding: 1rem 0;
        border-top: 1px solid var(--border);
        margin-top: 1rem;
      }
      .recent-txs ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .recent-txs li {
        padding: 0.25rem 0;
        font-family: var(--mono);
        font-size: 0.85rem;
      }
      .recent-txs a {
        color: var(--accent);
        text-decoration: none;
      }
      .recent-txs a:hover {
        text-decoration: underline;
      }
      .site-footer {
        padding: 1rem 0;
        border-top: 1px solid var(--border);
        font-size: 0.85rem;
        color: var(--muted);
      }
      .site-footer a {
        color: var(--accent);
        text-decoration: none;
      }
      .build-id {
        font-family: var(--mono);
        font-size: 0.8rem;
      }
      /* JsonView */
      .v-object,
      .v-array {
        margin: 0;
        padding-left: 1rem;
        border-left: 1px solid var(--border);
      }
      .v-key {
        font-family: var(--mono);
        font-weight: 600;
        font-size: 0.85rem;
        color: var(--muted);
        margin-top: 0.25rem;
      }
      .v-array {
        list-style: none;
      }
      .v-num,
      .v-bool,
      .v-null,
      .v-str {
        font-family: var(--mono);
        font-size: 0.85rem;
      }
      .v-num {
        color: var(--accent);
      }
      .v-txid,
      .v-addr,
      .v-policy {
        font-family: var(--mono);
        font-size: 0.85rem;
        color: var(--accent);
        text-decoration: none;
        border-bottom: 1px dashed currentColor;
        cursor: help;
      }
      .v-txid:hover {
        text-decoration: underline;
      }
      @media (max-width: 480px) {
        #app {
          padding: 0 0.5rem;
        }
        .site-header h1 {
          font-size: 1.2rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <noscript>
        This dashboard requires JavaScript. The same data is reachable
        via <code>GET /v1/treasury-inspect?scope=&lt;name&gt;</code>.
      </noscript>
    </div>
    <script src="./index.js" type="module"></script>
  </body>
</html>
