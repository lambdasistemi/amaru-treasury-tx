name: Image publish + deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: image-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: nixos
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/lambdasistemi/amaru-treasury-tx-api
    steps:
      - uses: actions/checkout@v6

      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build container image (nix)
        run: nix build --quiet .#image --out-link image-stream

      - name: Load, tag, login and push (docker provided via nix)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          nix shell nixpkgs#docker -c bash -euo pipefail -c '
            ./image-stream | docker load
            docker tag "$IMAGE:latest" "$IMAGE:${{ github.sha }}"
            echo "$GITHUB_TOKEN" \
              | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker push "$IMAGE:latest"
            docker push "$IMAGE:${{ github.sha }}"
          '

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    env:
      EXPECTED_SHA: ${{ github.sha }}
      PUBLIC_BASE_URL: https://amaru-treasury.plutimus.com
    steps:
      - name: SSH into production and update amaru-treasury
        uses: appleboy/ssh-action@v1.2.0
        env:
          EXPECTED_SHA: ${{ env.EXPECTED_SHA }}
          PUBLIC_BASE_URL: ${{ env.PUBLIC_BASE_URL }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          envs: EXPECTED_SHA,PUBLIC_BASE_URL
          script: |
            set -euo pipefail
            cd ~/services/amaru-treasury
            docker compose pull
            docker compose up -d

            version_body="$(mktemp)"
            cleanup() {
              rm -f "$version_body"
            }
            trap cleanup EXIT

            for attempt in $(seq 1 60); do
              if curl -fsS --max-time 5 \
                "$PUBLIC_BASE_URL/v1/version" \
                >"$version_body"; then
                version_json="$(tr -d '\n' < "$version_body")"
                git_commit="$(
                  printf '%s\n' "$version_json" \
                    | sed -n 's/.*"biGitCommit"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p'
                )"

                if [ -z "$git_commit" ]; then
                  echo "deploy smoke: /v1/version missing biGitCommit" >&2
                  cat "$version_body" >&2
                  exit 1
                fi

                case "$EXPECTED_SHA" in
                  "$git_commit"*)
                    ;;
                  *)
                    echo "deploy smoke: expected deployed commit prefix $EXPECTED_SHA, got $git_commit" >&2
                    cat "$version_body" >&2
                    exit 1
                    ;;
                esac

                grep -q '"biMetadataSha256"' "$version_body" \
                  || { echo "deploy smoke: /v1/version missing biMetadataSha256" >&2; cat "$version_body" >&2; exit 1; }
                grep -q '"biRecentTxsCount"' "$version_body" \
                  || { echo "deploy smoke: /v1/version missing biRecentTxsCount" >&2; cat "$version_body" >&2; exit 1; }

                echo "deploy smoke: /v1/version OK for $git_commit"
                break
              fi

              if [ "$attempt" -eq 60 ]; then
                echo "deploy smoke: /v1/version did not become ready" >&2
                docker compose ps >&2
                docker compose logs --tail=200 amaru-treasury >&2
                exit 1
              fi

              sleep 2
            done

            docker image prune -f
