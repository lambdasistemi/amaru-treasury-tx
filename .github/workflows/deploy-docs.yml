name: Build and deploy documentation

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: >-
    ${{
      github.workflow
    }}-${{
      github.event_name == 'pull_request'
        && format('pr-{0}', github.event.pull_request.number)
        || github.ref
    }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false
          path: checkout
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Regenerate the dependency graph live so the published site always
      # reflects flake.lock + cabal.project HEAD, including current pin
      # staleness vs upstream. Not committed; the committed copy
      # (docs/dependencies.md) is the deterministic one gated in CI.
      - name: Refresh dependency graph
        uses: paolino/dev-assets/dep-graph@main
        with:
          language: haskell
          flake-path: checkout
          owner-regex: "paolino|lambdasistemi|cardano-foundation|pragma-org"
          output: checkout/docs/dependencies.md
          title: "amaru-treasury-tx dependency graph"

      - name: Build docs
        working-directory: checkout
        run: >-
          nix develop github:paolino/dev-assets?dir=mkdocs --quiet
          -c mkdocs build --strict --site-dir site

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: checkout/site

      - name: Publish PR preview
        if: github.event_name == 'pull_request'
        uses: paolino/dev-assets/static-preview@main
        with:
          path: checkout/site
          comment-marker: "<!-- docs-preview-url -->"

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: nixos
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  pr-preview-cleanup:
    name: Remove PR Preview
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: nixos
    steps:
      - uses: paolino/dev-assets/static-preview@main
        with:
          mode: cleanup
