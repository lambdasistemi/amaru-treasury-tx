name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-gate:
    name: Build Gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false
          path: checkout
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build all derivations
        working-directory: checkout
        run: >-
          nix build --quiet
          .#checks.x86_64-linux.build
          .#checks.x86_64-linux.unit
          .#checks.x86_64-linux.golden
          .#checks.x86_64-linux.schema
          .#checks.x86_64-linux.smoke
          .#checks.x86_64-linux.lint
      - name: Release version contract
        working-directory: checkout
        run: scripts/release/check-version-consistency

  unit:
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false
          path: checkout
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Unit tests
        working-directory: checkout
        run: nix run --quiet .#unit

  golden:
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false
          path: checkout
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Golden tests
        working-directory: checkout
        run: nix run --quiet .#golden

  lint:
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false
          path: checkout
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Lint
        working-directory: checkout
        run: nix run --quiet .#lint

  smoke:
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false
          path: checkout
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Smoke test
        working-directory: checkout
        run: nix run --quiet .#smoke

  linux-artifact-smoke:
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false
          path: checkout
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build Linux release artifacts
        id: build
        working-directory: checkout
        run: |
          out="$(nix build --quiet --print-out-paths .#linux-release-artifacts)"
          echo "out=$out" >>"$GITHUB_OUTPUT"
          version="$(scripts/release/get-cabal-version)"
          echo "version=$version" >>"$GITHUB_OUTPUT"
      - name: Smoke Linux artifacts (CA wrapper + CLI help)
        working-directory: checkout
        run: |
          nix run --quiet .#linux-artifact-smoke -- \
            --artifacts-dir "${{ steps.build.outputs.out }}" \
            --artifact-version "${{ steps.build.outputs.version }}"

  dep-graph-drift:
    name: Dependency graph up to date
    if: github.event_name == 'pull_request'
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false
          path: checkout
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      # Deterministic render (staleness: false) — a pure function of
      # flake.lock + cabal.project, so this only fails when the committed
      # graph is actually out of date with the pins, never because an
      # upstream repo advanced its HEAD.
      - name: Regenerate dependency graph
        uses: paolino/dev-assets/dep-graph@main
        with:
          language: haskell
          flake-path: checkout
          owner-regex: "paolino|lambdasistemi|cardano-foundation|pragma-org"
          output: /tmp/dependencies.fresh.md
          title: "amaru-treasury-tx dependency graph"
          staleness: "false"
      - name: Compare with committed copy
        working-directory: checkout
        run: |
          if ! diff -u docs/dependencies.md /tmp/dependencies.fresh.md; then
            echo "::error::docs/dependencies.md is stale. Regenerate it with the dep-graph action (staleness: false) and commit the result." >&2
            exit 1
          fi
          echo "dependency graph is up to date"

  darwin-vault-tty:
    name: Darwin vault TTY smoke
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            extra-substituters = https://cache.iog.io https://paolino.cachix.org
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= paolino.cachix.org-1:ecmgO3CXdgSWA2cHlm4srknd/cLFMLmK3i3NrzeDFaE=
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Prove vault passphrase TTY path
        run: nix build --quiet .#checks.aarch64-darwin.vault-tty-smoke
