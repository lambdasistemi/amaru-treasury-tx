<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Amaru Treasury — inspect</title>
    <meta
      name="description"
      content="Live read-only view of the Amaru 2026 treasury across all five registered scopes."
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <!-- M3 typography (Roboto Flex + Roboto Mono).
         https://m3.material.io/styles/typography  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,600;8..144,700&family=Roboto+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Entire visual surface — see styles.css for taxonomy. -->
    <link rel="stylesheet" href="./styles.css" />
    <!-- Canonical JsonTree layout / theming from the
         browser-json-tree library — loads BEFORE
         style-build.css so the latter's
         `.json-tree-wrapper { --jt-bg: ... }` overrides
         win against the library's :root defaults. -->
    <link rel="stylesheet" href="./json-tree.css" />
    <!-- /operate page chrome (form + preview overlay) +
         project-side JsonTree theming overrides. -->
    <link rel="stylesheet" href="./style-build.css" />
  </head>
  <body>
    <div id="app"></div>
    <noscript>
      This dashboard needs JavaScript. The same data is reachable via
      <code>GET /v1/treasury-inspect?scope=&lt;name&gt;</code>.
    </noscript>
    <script type="module" src="./material.js"></script>
    <script src="./index.js" type="module"></script>
  </body>
</html>
