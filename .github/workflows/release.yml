name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build
        run: nix build --quiet .#default
      - name: Test
        run: nix run --quiet .#unit
      - name: Released
        run: echo "Released ${{ needs.release-please.outputs.tag_name }}"

  linux-bundles:
    name: Build Linux bundles (AppImage, DEB, RPM)
    needs: release-please
    # Always build on workflow_dispatch; on push, only build when
    # release-please cut a tag.
    if: ${{ github.event_name == 'workflow_dispatch' || needs.release-please.outputs.release_created }}
    runs-on: nixos
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build AppImage
        run: >-
          nix --quiet bundle
          --bundler github:ralismark/nix-appimage
          .#default
          -o amaru-treasury-tx.AppImage

      - name: Build DEB
        run: >-
          nix --quiet bundle
          --bundler github:NixOS/bundlers#toDEB
          .#default
          -o amaru-treasury-tx.deb

      - name: Build RPM
        run: >-
          nix --quiet bundle
          --bundler github:NixOS/bundlers#toRPM
          .#default
          -o amaru-treasury-tx.rpm

      - name: Stage artifacts
        env:
          TAG: ${{ needs.release-please.outputs.tag_name || format('manual-{0}', github.run_id) }}
        run: |
          mkdir -p artifacts
          cp amaru-treasury-tx.deb/*.deb \
            "artifacts/amaru-treasury-tx-${TAG}.deb"
          cp amaru-treasury-tx.rpm/*.rpm \
            "artifacts/amaru-treasury-tx-${TAG}.rpm"
          cp -L amaru-treasury-tx.AppImage \
            "artifacts/amaru-treasury-tx-${TAG}.AppImage"
          ls -lh artifacts/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: artifacts/*
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub release
        if: ${{ needs.release-please.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload ${TAG} \
            artifacts/amaru-treasury-tx-${TAG}.deb \
            artifacts/amaru-treasury-tx-${TAG}.rpm \
            artifacts/amaru-treasury-tx-${TAG}.AppImage \
            --clobber
