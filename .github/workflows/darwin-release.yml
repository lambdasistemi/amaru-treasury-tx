name: Darwin Release

on:
  push:
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/darwin-release.yml"
      - "flake.nix"
      - "nix/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "Release mode"
        type: choice
        options: [ "release", "dev-homebrew" ]
        default: "release"
      tag:
        description: "Existing tag to build for release mode, for example v0.1.1.0"
        required: false
        type: string
      publish:
        description: "Release mode only: upload to the GitHub release and update Homebrew"
        type: choice
        options: [ "no", "yes" ]
        default: "no"
      update_tap:
        description: "Dev Homebrew mode only: update lambdasistemi/homebrew-tap"
        type: choice
        options: [ "yes", "no" ]
        default: "yes"

permissions:
  contents: write

concurrency:
  group: >-
    darwin-release-${{
      github.ref_type == 'tag' && github.ref_name
      || inputs.tag
      || github.ref
    }}-${{ inputs.mode || github.event_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build aarch64-darwin artifacts
    runs-on: macos-14
    env:
      TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
      MODE: >-
        ${{
          github.event_name == 'pull_request' && 'dev-homebrew'
          || inputs.mode
          || 'release'
        }}
      PUBLISH: >-
        ${{
          github.event_name == 'push'
          || (inputs.mode != 'dev-homebrew' && inputs.publish == 'yes')
        }}
      UPDATE_TAP: ${{ inputs.update_tap || 'yes' }}
      DEV_TAG: dev-homebrew
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: >-
            ${{
              github.ref_type == 'tag' && github.ref_name
              || inputs.tag
              || github.ref
            }}

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            extra-substituters = https://cache.iog.io https://paolino.cachix.org
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= paolino.cachix.org-1:ecmgO3CXdgSWA2cHlm4srknd/cLFMLmK3i3NrzeDFaE=

      # install-nix-action only configures READ substituters. cachix-action
      # auths + auto-pushes new derivations on post-build, so subsequent
      # macos-14 runs can hit cache instead of recompiling. Without this
      # step the build still succeeds but every release re-burns the
      # GHC + cardano-crypto compile from source.
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build, smoke-test, and optionally publish Darwin Homebrew artifacts
        uses: paolino/dev-assets/darwin-homebrew-release@6864b20eb75c3578796e7f667562b5aea8780643
        with:
          mode: ${{ env.MODE }}
          tag: ${{ env.TAG }}
          publish: ${{ env.PUBLISH }}
          update-tap: ${{ env.UPDATE_TAP }}
          dev-tag: ${{ env.DEV_TAG }}
          release-package: darwin-release-artifacts
          dev-package: darwin-dev-homebrew-artifacts
          release-formula: amaru-treasury-tx.rb
          dev-formula: amaru-treasury-tx-dev.rb
          release-artifact-name: darwin-release-bundle
          dev-artifact-name: darwin-dev-homebrew-artifacts
          tarball-pattern: amaru-treasury-tx-*-aarch64-darwin.tar.gz
          installed-commands: amaru-treasury-tx swap-probe capture-swap-context
          cleanup-formulae: amaru-treasury-tx amaru-treasury-tx-dev
          tap-name: lambdasistemi/tap
          tap-repository: lambdasistemi/homebrew-tap
          github-token: ${{ github.token }}
          tap-token: ${{ secrets.TAP_TOKEN }}
          release-check-command: 'scripts/release/check-version-consistency "$TAG"'
          release-notes-command: 'scripts/release/extract-notes "$TAG"'
          release-title: amaru-treasury-tx ${{ env.TAG }}
          dev-release-title: amaru-treasury-tx dev Homebrew
          tarball-smoke-script: |
            amaru-treasury-tx --help
            capture-swap-context --help
            help_text="$(amaru-treasury-tx swap-wizard --help)"
            printf '%s\n' "$help_text"
            grep -F -- '--extra-signer,--signer SCOPE|HEX' <<<"$help_text" >/dev/null
            withdraw_help="$(amaru-treasury-tx withdraw-wizard --help)"
            printf '%s\n' "$withdraw_help"
            grep -F -- '--wallet-addr BECH32' <<<"$withdraw_help" >/dev/null
            grep -F -- '--validity-hours HOURS' <<<"$withdraw_help" >/dev/null
          brew-smoke-script: |
            amaru-treasury-tx --help
            amaru-treasury-tx withdraw-wizard --help
            test -x "$(command -v swap-probe)"
            capture-swap-context --help
            otool -L "$(which amaru-treasury-tx)"
